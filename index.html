<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>ClinicaPro</title>
</head>
<body>
<script>
function doLogin(){
  var u=document.getElementById('u').value;
  var p=document.getElementById('p').value;
  if(u==='admin'&&p==='1234'){
    document.getElementById('login').style.display='none';
    document.getElementById('app').style.display='block';
  } else {
    alert('Usuário ou senha incorretos!');
  }
}
</script>
<div id="login" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:#080b12;font-family:sans-serif;color:white">
  <h1 style="font-size:28px;margin-bottom:8px">Clínica<span style="color:#4f8ef7">Pro</span></h1>
  <div style="background:#0e1219;border:1px solid #1f2638;border-radius:20px;padding:28px;width:90%;max-width:380px;margin-top:20px">
    <h2 style="margin-bottom:20px">Entrar</h2>
    <input id="u" placeholder="Usuário" style="width:100%;padding:13px;background:#141820;border:1px solid #1f2638;border-radius:10px;color:white;font-size:15px;margin-bottom:12px;box-sizing:border-box"><br>
    <input id="p" type="password" placeholder="Senha" style="width:100%;padding:13px;background:#141820;border:1px solid #1f2638;border-radius:10px;color:white;font-size:15px;margin-bottom:16px;box-sizing:border-box"><br>
    <button onclick="doLogin()" style="width:100%;padding:14px;background:#4f8ef7;color:white;border:none;border-radius:10px;font-size:15px;font-weight:bold;cursor:pointer">Entrar</button>
    <p style="color:#6b7591;font-size:12px;margin-top:12px;text-align:center">Demo: admin / 1234</p>
  </div>
</div>
<div id="app" style="display:none;background:#080b12;min-height:100vh;font-family:sans-serif;color:white;padding:20px">
  <h1>Clínica<span style="color:#4f8ef7">Pro</span> — Dashboard</h1>
  <p style="color:#6b7591">Em construção... 🚧</p>
</div>
</body>
</html>
