<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ClinicaPro</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#080b12;--s1:#0e1219;--s2:#141820;--s3:#1a1f2e;--border:#1f2638;--blue:#4f8ef7;--blue2:#3b6fd4;--green:#22c55e;--yellow:#f59e0b;--red:#ef4444;--purple:#a78bfa;--text:#eef0f6;--text2:#6b7591;--text3:#3a4160;--font:'Plus Jakarta Sans',sans-serif;--radius:16px;--nav-h:68px}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
#login-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:radial-gradient(ellipse at 50% 0%,#0d1a3a 0%,var(--bg) 70%)}
.login-logo{font-size:28px;font-weight:800;letter-spacing:-1px;margin-bottom:8px}
.login-logo span{color:var(--blue)}
.login-sub{font-size:14px;color:var(--text2);margin-bottom:40px}
.login-card{background:var(--s1);border:1px solid var(--border);border-radius:24px;padding:28px 24px;width:100%;max-width:380px}
.login-title{font-size:20px;font-weight:700;margin-bottom:4px}
.login-hint{font-size:13px;color:var(--text2);margin-bottom:24px}
.form-group{margin-bottom:16px}
.form-label{font-size:12px;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;display:block}
.input{width:100%;background:var(--s2);border:1.5px solid var(--border);border-radius:12px;padding:13px 16px;color:var(--text);font-family:var(--font);font-size:15px;outline:none;transition:border-color .2s}
.input:focus{border-color:var(--blue)}
.input::placeholder{color:var(--text3)}
.btn-login{width:100%;padding:15px;background:var(--blue);color:#fff;border:none;border-radius:12px;font-family:var(--font);font-size:15px;font-weight:700;cursor:pointer;margin-top:8px;transition:all .2s}
.btn-login:active{transform:scale(.98);background:var(--blue2)}
.login-error{color:var(--red);font-size:13px;margin-top:10px;text-align:center;display:none}
#app{display:none;padding-bottom:var(--nav-h)}
.topbar{position:sticky;top:0;z-index:50;background:rgba(8,11,18,.9);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between}
.topbar-logo{font-size:18px;font-weight:800;letter-spacing:-.5px}
.topbar-logo span{color:var(--blue)}
.topbar-right{display:flex;align-items:center;gap:10px}
.avatar{width:34px;height:34px;background:linear-gradient(135deg,var(--blue),var(--purple));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700}
.logout-btn{background:var(--s2);border:1px solid var(--border);color:var(--text2);padding:6px 12px;border-radius:8px;font-family:var(--font);font-size:12px;cursor:pointer}
.page{display:none;padding:20px;animation:fadeUp .25s ease}
.page.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.page-header{margin-bottom:20px}
.page-title{font-size:22px;font-weight:800;letter-spacing:-.5px}
.page-sub{font-size:13px;color:var(--text2);margin-top:2px}
.cards-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.card{background:var(--s1);border:1px solid var(--border);border-radius:var(--radius);padding:16px;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:var(--radius) var(--radius) 0 0}
.card-blue::before{background:var(--blue)}.card-green::before{background:var(--green)}.card-yellow::before{background:var(--yellow)}.card-red::before{background:var(--red)}
.card-icon{font-size:20px;margin-bottom:8px}
.card-label{font-size:11px;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}
.card-value{font-size:28px;font-weight:800;letter-spacing:-1px}
.section{background:var(--s1);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:16px}
.section-head{padding:16px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.section-title{font-size:14px;font-weight:700}
.list-item{padding:14px 18px;border-bottom:1px solid rgba(31,38,56,.5);display:flex;align-items:center;justify-content:space-between;gap:12px}
.list-item:last-child{border-bottom:none}
.list-name{font-size:14px;font-weight:600}
.list-sub{font-size:12px;color:var(--text2);margin-top:2px}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.badge-blue{background:rgba(79,142,247,.15);color:var(--blue)}.badge-green{background:rgba(34,197,94,.15);color:var(--green)}.badge-yellow{background:rgba(245,158,11,.15);color:var(--yellow)}.badge-red{background:rgba(239,68,68,.15);color:var(--red)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 14px;border-radius:10px;font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s}
.btn-primary{background:var(--blue);color:#fff}.btn-ghost{background:var(--s2);color:var(--text2);border:1px solid var(--border)}.btn-danger{background:rgba(239,68,68,.1);color:var(--red);border:1px solid rgba(239,68,68,.2)}.btn-sm{padding:6px 10px;font-size:12px}
.fab{position:fixed;bottom:calc(var(--nav-h) + 16px);right:20px;width:52px;height:52px;background:var(--blue);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;box-shadow:0 4px 20px rgba(79,142,247,.4);cursor:pointer;border:none;color:#fff;transition:transform .15s;z-index:40}
.fab:active{transform:scale(.92)}
.search-wrap{margin-bottom:14px;position:relative}
.search-input{width:100%;background:var(--s1);border:1.5px solid var(--border);border-radius:12px;padding:11px 16px 11px 40px;color:var(--text);font-family:var(--font);font-size:14px;outline:none;transition:border-color .2s}
.search-input:focus{border-color:var(--blue)}
.search-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:16px}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)}
.overlay.open{display:flex}
.modal{background:var(--s1);border:1px solid var(--border);border-radius:24px 24px 0 0;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 0}
.modal-head{padding:16px 22px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:17px;font-weight:700}
.modal-close{background:none;border:none;color:var(--text2);font-size:22px;cursor:pointer;line-height:1}
.modal-body{padding:20px 22px}
.modal-footer{padding:14px 22px;border-top:1px solid var(--border);display:flex;gap:10px}
.modal-footer .btn{flex:1;justify-content:center}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);background:rgba(14,18,25,.95);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;z-index:100}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;color:var(--text3);transition:color .15s;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.3px;padding-bottom:4px}
.nav-item.active{color:var(--blue)}
.nav-item .nav-icon{font-size:20px}
.chart-wrap{padding:16px 18px 8px}
.bars{display:flex;align-items:flex-end;gap:6px;height:80px}
.bar{flex:1;background:var(--blue);border-radius:4px 4px 0 0;opacity:.6;min-height:4px}
.bar-labels{display:flex;justify-content:space-between;padding:6px 0 0;font-size:10px;color:var(--text3)}
.empty{text-align:center;padding:40px 20px;color:var(--text2)}
.empty-icon{font-size:36px;margin-bottom:10px}
.empty-text{font-size:13px}
#toast{position:fixed;bottom:calc(var(--nav-h) + 12px);left:50%;transform:translateX(-50%) translateY(20px);background:var(--s2);border:1px solid var(--border);border-radius:12px;padding:12px 18px;font-size:13px;white-space:nowrap;display:flex;align-items:center;gap:8px;z-index:300;opacity:0;transition:all .25s;pointer-events:none}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.filter-row{display:flex;gap:8px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px}
.filter-row::-webkit-scrollbar{display:none}
.filter-chip{padding:7px 14px;border-radius:20px;font-size:12px;font-weight:600;background:var(--s1);border:1.5px solid var(--border);color:var(--text2);cursor:pointer;white-space:nowrap}
.filter-chip.active{background:rgba(79,142,247,.15);border-color:var(--blue);color:var(--blue)}
select.input{appearance:none}
</style>
</head>
